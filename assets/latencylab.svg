<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LatencyLab">
  <defs>
    <linearGradient id="ll-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a63d2"/>
      <stop offset="1" stop-color="#6d47b3"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#ll-tile)"/>
  <!-- crown / top button -->
  <rect x="27" y="9" width="10" height="6" rx="2" fill="#e9e2f7"/>
  <rect x="30" y="14" width="4" height="5" rx="1.5" fill="#e9e2f7"/>
  <!-- outer case -->
  <circle cx="32" cy="38" r="20" fill="none" stroke="#f3eefb" stroke-width="4"/>
  <!-- tick marks -->
  <g stroke="#f3eefb" stroke-width="2" stroke-linecap="round" opacity="0.75">
    <line x1="32" y1="21" x2="32" y2="25"/>
    <line x1="32" y1="51" x2="32" y2="55"/>
    <line x1="15" y1="38" x2="19" y2="38"/>
    <line x1="45" y1="38" x2="49" y2="38"/>
  </g>
  <!-- hands -->
  <line x1="32" y1="38" x2="43" y2="28" stroke="#26a69a" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="32" y2="27" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="38" r="3.4" fill="#ffffff"/>
</svg>
